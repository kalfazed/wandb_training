# A DictConfig of named callback specs. In train.py we iterate `.values()`
# and instantiate each — this lets you add/remove individual callbacks from
# the CLI:
#   python train.py ~callbacks.lr_monitor          # remove one
#   python train.py callbacks.model_checkpoint.save_top_k=3

model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${hydra:runtime.output_dir}/checkpoints
  # Filename omits the metric on purpose: "val/loss" contains a "/" which
  # confuses filesystem paths. We rely on save_top_k=1 + monitor to pick best.
  filename: best-{epoch:03d}
  auto_insert_metric_name: false
  monitor: val/loss
  mode: min
  save_top_k: 1
  save_last: true
  verbose: true

lr_monitor:
  _target_: lightning.pytorch.callbacks.LearningRateMonitor
  logging_interval: epoch
